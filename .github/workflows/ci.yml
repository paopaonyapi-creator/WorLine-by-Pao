name: E2E and CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E Tests
        # The E2E tests are built to automatically skip authenticated suites
        # if PLAYWRIGHT_TEST_USER_EMAIL or PLAYWRIGHT_TEST_ADMIN_EMAIL are missing.
        # This keeps the CI safely green for unauthenticated paths when secrets are hidden (e.g., from forks).
        env:
          PLAYWRIGHT_TEST_USER_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_USER_EMAIL }}
          PLAYWRIGHT_TEST_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_USER_PASSWORD }}
          PLAYWRIGHT_TEST_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_ADMIN_EMAIL }}
          PLAYWRIGHT_TEST_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_ADMIN_PASSWORD }}
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321" # Mock or staging
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy-key"
        run: pnpm test:e2e
